<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEat Dashboard</title>
    <!-- Tech Stack: Html, css, js, Framework: Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/globalStyles.css">
</head>
<body>

    <!-- TOP NAVIGATION BAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
        <div class="container-fluid">
            <!-- Brand Logo -->
            <a class="navbar-brand text-success" href="#" style="font-family: 'Lilita One', cursive; font-size: 1.5rem;">
                <i class="bi bi-camera"></i> SnapEat
            </a>
            
            <!-- Navbar Toggler for Mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse justify-content-end" id="topNav">
                <ul class="navbar-nav">
                    <!-- Profile / User dropdown can go here -->
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="bi bi-person-circle"></i> Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="loginPage.html"><i class="bi bi-box-arrow-right"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN DASHBOARD LAYOUT -->
    <div class="container-fluid">
        <div class="row">
            
            <!-- SIDEBAR NAVIGATION -->
            <aside class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse shadow-sm" id="sidebarMenu" style="min-height: calc(100vh - 70px);">
                <div class="position-sticky pt-4">
                    <ul class="nav flex-column gap-2">
                        <li class="nav-item">
                            <a class="nav-link active fw-bold text-success" href="index.html">
                                <i class="bi bi-house-door me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="scanFood.html">
                                <i class="bi bi-upc-scan me-2"></i> Scan Food
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="historyLog.html">
                                <i class="bi bi-clock-history me-2"></i> History Log
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="healthReports.html">
                                <i class="bi bi-file-medical me-2"></i> Health Reports
                            </a>
                        </li>
                    </ul>
                </div>
            </aside>

            <!-- MAIN CONTENT AREA -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
                
                <!-- Page Header -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2" style="font-weight: 600;">Welcome back, Gelo!</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <!-- Example Action Button -->
                        <button type="button" class="btn btn-sm btn-success shadow-sm">
                            <i class="bi bi-plus-circle"></i> New Scan
                        </button>
                    </div>
                </div>

                <!-- Dashboard Content Grid -->
                <div class="row g-4 mb-4">
                    <!-- Widget 1: Daily Calorie Summary -->
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <h5 class="card-title text-muted" style="font-size: 0.9rem;">Calories Consumed</h5>
                                <h2>1,450 <span style="font-size: 1rem; font-weight: normal;" class="text-muted">/ 2,000 kcal</span></h2>
                                <!-- Progress bar placeholder -->
                            </div>
                        </div>
                    </div>

                    <!-- Widget 2: Recent Scans / Meals -->
                    <div class="col-md-8">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <h5 class="card-title mb-3">Recent Scans</h5>
                                <!-- Table or List placeholder -->
                                <p class="text-muted">Your recently identified food items will appear here.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Secondary Content Section -->
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <h5 class="card-title">Nutritional Insights</h5>
                                <!-- Charts or detailed stats placeholder -->
                                <p class="text-muted">Macronutrient breakdown over the last 7 days...</p>
                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Add Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/appMain.js"></script>
</body>
</html>

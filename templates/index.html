<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEat - Scan Your Food</title>
    <!-- Tech Stack: Html, css, js, Framework: Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/globalStyles.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .logo-text {
            font-family: 'Lilita One', cursive;
            font-size: 4rem;
            color: #198754;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .tagline {
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 3rem;
            max-width: 500px;
        }
        .scan-action-card {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            max-width: 400px;
            width: 100%;
        }
        .scan-action-card:hover {
            transform: translateY(-10px);
        }
        .btn-scan-primary {
            background: #198754;
            color: white;
            border: none;
            padding: 1.2rem 2.5rem;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(25, 135, 84, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-scan-primary:hover {
            background: #157347;
            transform: scale(1.02);
            color: white;
        }
        .feature-icon {
            font-size: 3rem;
            color: #198754;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container hero-section">
        <!-- Logo -->
        <h1 class="logo-text">
            <i class="bi bi-camera"></i> SnapEat
        </h1>
        {% if username %}
        <h4 class="mb-3 fw-normal text-secondary">Welcome back, {{ username }}!</h4>
        {% else %}
        <h4 class="mb-3 fw-normal text-secondary">Welcome back!</h4>
        {% endif %}
        <p class="tagline">The quickest way to track your nutrition. Just point, snap, and know exactly what you're eating.</p>

        <!-- Main Action -->
        <div class="scan-action-card">
            <div class="feature-icon">
                <i class="bi bi-upc-scan"></i>
            </div>
            <a href="/scan" class="btn-scan-primary">
                START SCANNING
            </a>
            <p class="mt-4 text-muted small">No manual typing required. AI-powered identification.</p>
        </div>

        <!-- Footer Links -->
        <div class="mt-5">
            <a href="/history" class="text-decoration-none text-muted mx-3">History</a>
            <span class="text-muted">|</span>
            <a href="/logout" class="text-decoration-none text-danger fw-bold mx-3">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

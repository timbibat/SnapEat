<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEat Forgot Password</title>
    <!-- Tech Stack: Html, css, js, Framework: Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/globalStyles.css">
    <link rel="stylesheet" href="../static/css/authStyles.css">
</head>
<body>
    <div class="pageContainer">
        <!-- Forgot Password Card -->
        <div class="authCard text-center">
            
            <!-- Main Form -->
            <form id="forgotPasswordForm">
                <h2 class="authTitle">Reset Password</h2>
                <p class="text-start mb-4" style="color: var(--textGray); font-size: 0.9rem;">Enter your email address and we'll send you a link to reset your password.</p>

                <!-- Email Input -->
                <div class="customInputWrapper mb-2">
                    <input type="email" class="form-control customInput" placeholder="Email" id="forgotEmail" required>
                    <i class="bi bi-envelope customInputIcon"></i>
                </div>

                <!-- Error Message below inputs, hidden by default -->
                <div id="forgotErrorMessage" class="errorMessage text-danger mb-3 text-start"></div>

                <!-- Reset Button -->
                <div class="d-grid col-8 mx-auto mb-3 mt-4">
                    <button type="submit" class="btn authBtn">SEND LINK</button>
                </div>
            </form>

            <!-- Bottom Login Text -->
            <div class="bottomTextWrapper">
                <span class="bottomText">Remember your password? <a href="/login" class="signupLink">Login</a></span>
            </div>
        </div>
    </div>

    <!-- Add Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/appMain.js"></script>
    <script src="../static/js/authLogic.js"></script>
</body>
</html>

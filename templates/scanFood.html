<!-- Food Scanner page for SnapEat. Interface for camera access and capturing food images for analysis. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Scanner – SnapEat</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles (only what Bootstrap cannot cover) -->
    <link rel="stylesheet" href="/static/css/scanStyles.css">
</head>

<!-- d-flex flex-column: vertical stack; vh-100: full viewport height; overflow-hidden: no scroll -->

<body class="scanBody d-flex flex-column vh-100 overflow-hidden">

    <!-- ── Header Bar ──────────────────────────────────────── -->
    <!-- d-flex + justify/align centres the logo; w-100 fills width; flex-shrink-0 prevents squishing -->
    <header class="scanHeader d-flex justify-content-center align-items-center w-100 flex-shrink-0">
        <img src="/static/snapeat.png" alt="SnapEat" class="snapeatLogo">
    </header>

    <!-- ── Camera Viewport ─────────────────────────────────── -->
    <!-- flex-grow-1: takes remaining height; position-relative: anchors the focus overlay -->
    <main
        class="cameraMainArea flex-grow-1 position-relative d-flex justify-content-center align-items-center p-3 pb-2">

        <!-- Live camera feed -->
        <video id="cameraPreview" class="cameraPreview w-100 h-100" autoplay playsinline muted></video>

        <!-- Focus-bracket overlay – position-absolute centres it over the video -->
        <div class="focusOverlay position-absolute top-50 start-50 translate-middle pe-none">
            <svg width="220" height="220" viewBox="0 0 250 250" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Top Left -->
                <path d="M 70 15 L 40 15 C 26.193 15 15 26.193 15 40 L 15 70" stroke="white" stroke-width="16"
                    stroke-linecap="round" stroke-linejoin="round" />
                <!-- Top Right -->
                <path d="M 180 15 L 210 15 C 223.807 15 235 26.193 235 40 L 235 70" stroke="white" stroke-width="16"
                    stroke-linecap="round" stroke-linejoin="round" />
                <!-- Bottom Left -->
                <path d="M 70 235 L 40 235 C 26.193 235 15 223.807 15 210 L 15 180" stroke="white" stroke-width="16"
                    stroke-linecap="round" stroke-linejoin="round" />
                <!-- Bottom Right -->
                <path d="M 180 235 L 210 235 C 223.807 235 235 223.807 235 210 L 235 180" stroke="white"
                    stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
    </main>

    <!-- ── Bottom Controls ─────────────────────────────────── -->
    <!-- d-flex + justify-content-around spaces the three controls evenly; flex-shrink-0 prevents squishing -->
    <footer class="bottomControlsContainer d-flex justify-content-around align-items-center w-100 flex-shrink-0 px-4">

        <!-- Gallery / File Upload -->
        <label for="imageUploadInput"
            class="uploadLabel d-flex justify-content-center align-items-center shadow-sm mb-0"
            title="Upload from gallery">
            <img src="https://images.unsplash.com/photo-1594212752119-75a74e40294f?w=150&q=80" alt="Gallery"
                class="galleryIcon">
        </label>

        <!-- Hidden file input required by JS -->
        <input type="file" id="imageUploadInput" accept="image/*" class="d-none">

        <!-- Capture Button required by JS -->
        <button id="captureBtn" class="captureBtn d-flex justify-content-center align-items-center shadow p-0 border-0"
            aria-label="Capture Image">
            <div class="captureBtnInner rounded-circle"></div>
        </button>

        <!-- Switch Camera Button required by JS -->
        <button id="switchCameraBtn"
            class="switchCameraBtn d-flex justify-content-center align-items-center border-0 bg-transparent"
            aria-label="Switch Camera">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                <path d="M3 3v5h5"></path>
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                <path d="M16 21v-5h5"></path>
            </svg>
        </button>
    </footer>

    <!-- Hidden canvas required by JS -->
    <canvas id="captureCanvas" class="d-none"></canvas>

    <!-- ── Loading Overlay (shown during AI processing) ─── -->
    <!-- position-fixed + inset-0 via custom CSS; d-flex centres the card -->
    <div id="loadingOverlay" class="loadingOverlay d-flex justify-content-center align-items-center" aria-live="polite"
        aria-label="Analyzing food, please wait" hidden>
        <div class="loadingCard d-flex flex-column align-items-center">
            <div class="loadingSpinnerRing position-relative">
                <div class="loadingSpinnerArc position-absolute"></div>
            </div>
            <p class="loadingTitle fw-bold mb-1">Analyzing your food&hellip;</p>
            <p class="loadingSubtitle text-secondary mb-0">This may take a few seconds</p>
        </div>
    </div>

    <!-- JS References -->
    <script src="https://js.puter.com/v2/"></script>
    <!-- JS References -->
    <script src="https://js.puter.com/v2/"></script>
    <script>
        // Use the Auth Token to sign in silently
        const PUTER_AUTH_TOKEN = "{{ puter_auth_token }}";

        if (PUTER_AUTH_TOKEN && PUTER_AUTH_TOKEN !== "None") {
            // Sign in with token - this is the "Golden Fix" for redirects
            puter.auth.signInWithToken(PUTER_AUTH_TOKEN).then(() => {
                console.log("Puter: Silently signed in with token.");
            }).catch(err => {
                console.error("Puter Auth Error:", err);
            });
        } else {
            console.warn("Puter Auth: No token found. Login may be required.");
        }
    </script>
    <script src="/static/js/scannerLogic.js"></script>
</body>

</html>

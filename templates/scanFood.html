<!-- Food Scanner page for SnapEat. Interface for camera access and capturing food images for analysis. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Scanner</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="../static/css/scanStyles.css">
</head>
<body class="d-flex flex-column vh-100 scanBody">

    <!-- Top Decorative Header -->
    <header class="topDecorationContainer">
        <div class="topDecorationCurve"></div>
    </header>

    <!-- Camera and Preview Area -->
    <main class="flex-grow-1 d-flex justify-content-center align-items-center position-relative cameraMainArea">
        
        <!-- Video element required by JS -->
        <video id="cameraPreview" class="cameraPreview" autoplay playsinline muted></video>

        <!-- Focus Bracket Overlay -->
        <div class="focusOverlay d-flex justify-content-center align-items-center">
            <svg width="250" height="250" viewBox="0 0 250 250" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Top Left -->
                <path d="M 70 15 L 40 15 C 26.193 15 15 26.193 15 40 L 15 70" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Top Right -->
                <path d="M 180 15 L 210 15 C 223.807 15 235 26.193 235 40 L 235 70" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Bottom Left -->
                <path d="M 70 235 L 40 235 C 26.193 235 15 223.807 15 210 L 15 180" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Bottom Right -->
                <path d="M 180 235 L 210 235 C 223.807 235 235 223.807 235 210 L 235 180" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </main>

    <!-- Bottom Controls Area -->
    <footer class="bottomControlsContainer d-flex justify-content-around align-items-center">
        
        <!-- Gallery / File Upload (Label triggers the hidden input without needing new JS) -->
        <label for="imageUploadInput" class="uploadLabel mb-0 shadow-sm">
            <!-- Placeholder thumbnail to mimic the hotdog in the design -->
            <img src="https://images.unsplash.com/photo-1594212752119-75a74e40294f?w=150&q=80" alt="Gallery" class="galleryIcon">
        </label>
        
        <!-- Hidden input required by JS -->
        <input type="file" id="imageUploadInput" accept="image/*" class="d-none">

        <!-- Capture Button required by JS -->
        <button id="captureBtn" class="captureBtn shadow" aria-label="Capture Image">
            <div class="captureBtnInner"></div>
        </button>

        <!-- Switch Camera Button required by JS -->
        <button id="switchCameraBtn" class="switchCameraBtn" aria-label="Switch Camera">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                <path d="M3 3v5h5"></path>
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                <path d="M16 21v-5h5"></path>
            </svg>
        </button>
    </footer>

    <!-- Hidden canvas required by JS for processing (included explicitly per documentation) -->
    <canvas id="captureCanvas" class="d-none"></canvas>

    <!-- JS References -->
    <script src="appMain.js"></script> <!-- Optional AppMain fallback -->
    <script src="../static/js/scannerLogic.js"></script> <!-- The JS file you provided -->
</body>
</html>

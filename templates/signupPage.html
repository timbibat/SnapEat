<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEat Signup</title>
    <!-- Tech Stack: Html, css, js, Framework: Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/globalStyles.css">
    <link rel="stylesheet" href="../static/css/authStyles.css">
</head>
<body>
    <div class="pageContainer">
        <!-- Signup Card -->
        <div class="authCard text-center">
            
            <!-- Main Form -->
            <form id="signupForm">
                <h2 class="authTitle">Create an account</h2>

                <!-- Name Input -->
                <div class="customInputWrapper mb-3">
                    <input type="text" class="form-control customInput" placeholder="Full Name" id="signupName" required>
                    <i class="bi bi-person customInputIcon"></i>
                </div>

                <!-- Email Input -->
                <div class="customInputWrapper mb-3">
                    <input type="email" class="form-control customInput" placeholder="Email" id="signupEmail" required>
                    <i class="bi bi-envelope customInputIcon"></i>
                </div>

                <!-- Password Input -->
                <div class="customInputWrapper mb-3">
                    <input type="password" class="form-control customInput" placeholder="Password" id="signupPassword" required>
                    <i class="bi bi-eye-slash customInputIcon cursorPointer" id="toggleSignupPasswordIcon"></i>
                </div>

                <!-- Confirm Password Input -->
                <div class="customInputWrapper mb-2">
                    <input type="password" class="form-control customInput" placeholder="Confirm Password" id="signupConfirmPassword" required>
                    <i class="bi bi-eye-slash customInputIcon cursorPointer" id="toggleConfirmPasswordIcon"></i>
                </div>

                <!-- Error Message below inputs, hidden by default -->
                <div id="signupErrorMessage" class="errorMessage text-danger mb-3 text-start"></div>

                <!-- Signup Button -->
                <div class="d-grid col-8 mx-auto mb-3 mt-4">
                    <button type="submit" class="btn authBtn">SIGNUP</button>
                </div>
            </form>

            <!-- Bottom Login Text -->
            <div class="bottomTextWrapper">
                <span class="bottomText">Already have an account? <a href="/login" class="signupLink">Login</a></span>
            </div>
        </div>
    </div>

    <!-- Add Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/appMain.js"></script>
    <script src="../static/js/authLogic.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEat Login</title>
    <!-- Tech Stack: Html, css, js, Framework: Bootstrap -->
    <!-- Add Google Fonts: Poppins for body, Lilita One for the chunky title -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Add Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Add Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* CSS Variables based on color palette */
        :root {
            --primaryGreen: #336A29; 
            --btnGreen: #ABC270; 
            --btnHoverGreen: #94A85D; 
            --bodyBackground: #ffffff; 
            --linkBlue: #0d6efd; 
            --inputBackground: #fcfcfc; 
            --textGray: #473C33; 
            --subtleTextGray: #6c757d; 
            --inputBorder: #e1e1e1;
            --inputShadow: rgba(0, 0, 0, 0.05);
            --cardShadow: rgba(0, 0, 0, 0.08);
        }

        /* Base Styles using camelCase */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bodyBackground);
            color: var(--textGray);
        }

        /* Page Layout: Center Content */
        .pageContainer {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Login Card */
        .loginCard {
            width: 100%;
            max-width: 480px;
            background-color: #fff;
            padding: 4rem 3.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--cardShadow);
            border-bottom: 3px solid rgba(0,0,0,0.02);
        }

        /* Text Styles - UPDATED for the new chunky style */
        .loginTitle {
            font-family: 'Lilita One', cursive; /* Chunky, bubbly font */
            color: var(--primaryGreen);
            text-transform: uppercase;
            margin-bottom: 0.5rem; /* Pulled closer to the input box */
            font-size: 1.15rem; /* Scaled down to match image proportions */
            letter-spacing: 0.5px;
            text-align: left; /* Left aligned */
        }

        /* Input Fields */
        .customInputWrapper {
            position: relative;
        }

        .customInput {
            background-color: var(--inputBackground);
            border: 1px solid var(--inputBorder);
            border-radius: 20px;
            padding: 1.1rem 1.25rem;
            padding-right: 3rem; 
            color: var(--textGray);
            font-size: 1rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03); 
            transition: all 0.2s ease-in-out;
        }

        .customInput::placeholder {
            color: #a0a0a0;
        }

        .customInput:focus {
            /* Updated to match the blue focus ring in your new image */
            border-color: #0d6efd;
            background-color: #fff;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03), 0 0 0 3px rgba(13, 110, 253, 0.25); 
            outline: none;
        }

        /* Icons inside Inputs */
        .customInputIcon {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #000; /* Darkened icon based on your image */
            font-size: 1.1rem;
        }

        .cursorPointer {
            cursor: pointer;
        }

        /* Error Message below form fields */
        .errorMessage {
            font-size: 0.9rem;
            display: none;
            margin-top: -0.5rem;
        }

        /* Forgot Password Link Wrapper */
        .forgotPasswordWrapper {
            margin-bottom: 1.5rem;
        }

        .forgotPasswordLink {
            color: var(--linkBlue);
            text-decoration: underline; /* Added underline to match image */
            font-size: 0.85rem;
        }
        .forgotPasswordLink:hover {
            color: #0a58ca;
        }

        /* Login Button */
        .loginBtn {
            background-color: var(--btnGreen);
            border-color: var(--btnGreen);
            color: white;
            border-radius: 20px;
            font-weight: 700;
            padding: 1.1rem 0;
            font-size: 1.1rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(171, 194, 112, 0.3);
            width: 100%;
            transition: all 0.2s ease-in-out;
            margin-top: 1rem;
        }

        .loginBtn:hover {
            background-color: var(--btnHoverGreen);
            border-color: var(--btnHoverGreen);
            transform: translateY(-1px);
            color: white;
        }

        /* Bottom Text */
        .bottomTextWrapper {
            margin-top: 3.5rem;
        }

        .bottomText {
            color: var(--subtleTextGray);
            font-size: 0.9rem;
        }

        .signupLink {
            color: var(--linkBlue);
            text-decoration: underline; /* Matching image */
            font-weight: 400;
        }
        .signupLink:hover {
            color: #0a58ca;
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 576px) {
            .loginCard {
                padding: 3rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="pageContainer">
        <!-- Login Card -->
        <div class="loginCard text-center">
            
            <!-- Main Form -->
            <form id="loginForm">
                
                <!-- Main Title in green, now styled and left-aligned above the input -->
                <h2 class="loginTitle">Log in to your account</h2>

                <!-- Email Input with right icon -->
                <div class="customInputWrapper mb-3">
                    <input type="text" class="form-control customInput" placeholder="Email" id="emailInput" required>
                    <i class="bi bi-eye-slash customInputIcon"></i> <!-- Placed the eye-slash to match your image exactly -->
                </div>

                <!-- Password Input with right visibility toggle icon -->
                <div class="customInputWrapper mb-2">
                    <input type="password" class="form-control customInput" placeholder="Password" id="passwordInput" required>
                    <i class="bi bi-eye-slash customInputIcon cursorPointer" id="togglePasswordIcon"></i>
                </div>

                <!-- Error Message below inputs, hidden by default -->
                <div id="loginErrorMessage" class="errorMessage text-danger mb-3 text-start">
                    Invalid email or password.
                </div>

                <!-- Forgot Password Link -->
                <div class="forgotPasswordWrapper text-start">
                    <a href="forgotpassword.html" class="forgotPasswordLink">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <div class="d-grid col-8 mx-auto mb-3">
                    <button type="submit" class="btn loginBtn">LOGIN</button>
                </div>
            </form>

            <!-- Bottom Signup Text -->
            <div class="bottomTextWrapper">
                <span class="bottomText">Don't have an account? <a href="signup.html" class="signupLink">Signup</a></span>
            </div>
        </div>
    </div>

    <!-- Add Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* Custom JS Logic */

        // Password Visibility Toggle
        const passwordInput = document.getElementById('passwordInput');
        const togglePasswordIcon = document.getElementById('togglePasswordIcon');

        togglePasswordIcon.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePasswordIcon.classList.remove('bi-eye-slash');
                togglePasswordIcon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                togglePasswordIcon.classList.remove('bi-eye');
                togglePasswordIcon.classList.add('bi-eye-slash');
            }
        });

        // Login Logic
        const loginForm = document.getElementById('loginForm');
        const errorMessageEl = document.getElementById('loginErrorMessage');

        const CORRECT_EMAIL = "email";
        const CORRECT_PASSWORD = "password";

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const enteredEmail = document.getElementById('emailInput').value;
            const enteredPassword = passwordInput.value;

            if (enteredEmail === CORRECT_EMAIL && enteredPassword === CORRECT_PASSWORD) {
                errorMessageEl.style.display = 'none';
                window.location.href = 'index.html'; 
            } else {
                errorMessageEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>

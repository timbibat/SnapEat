<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEat Login</title>
    <!-- Tech Stack: Html, css, js, Framework: Bootstrap -->
    <!-- Add Google Fonts: Poppins for body, Lilita One for the chunky title -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Add Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Add Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/globalStyles.css">
    <link rel="stylesheet" href="../static/css/authStyles.css">
</head>
<body>
    <div class="pageContainer">
        <!-- Login Card -->
        <div class="authCard text-center">
            
            <!-- Main Form -->
            <form id="loginForm">
                
                <!-- Main Title in green, now styled and left-aligned above the input -->
                <h2 class="authTitle">Log in to your account</h2>

                <!-- Email Input with right icon -->
                <div class="customInputWrapper mb-3">
                    <input type="text" class="form-control customInput" placeholder="Email" id="loginEmail" required>
                    <i class="bi bi-envelope customInputIcon"></i>
                </div>

                <!-- Password Input with right visibility toggle icon -->
                <div class="customInputWrapper mb-2">
                    <input type="password" class="form-control customInput" placeholder="Password" id="loginPassword" required>
                    <i class="bi bi-eye-slash customInputIcon cursorPointer" id="togglePasswordIcon"></i>
                </div>

                <!-- Error Message below inputs, hidden by default -->
                <div id="loginErrorMessage" class="errorMessage text-danger mb-3 text-start">
                    Invalid email or password.
                </div>

                <!-- Forgot Password Link -->
                <div class="forgotPasswordWrapper text-start">
                    <a href="/forgot-password" class="forgotPasswordLink">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <div class="d-grid col-8 mx-auto mb-3">
                    <button type="submit" class="btn authBtn">LOGIN</button>
                </div>
            </form>

            <!-- Bottom Signup Text -->
            <div class="bottomTextWrapper">
                <span class="bottomText">Don't have an account? <a href="/signup" class="signupLink">Signup</a></span>
            </div>
        </div>
    </div>

    <!-- Add Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/appMain.js"></script>
    <script src="../static/js/authLogic.js"></script>
</body>
</html>
